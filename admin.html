<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula Shop - Admin Portal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        .admin-container {
            max-width: 800px;
            margin: 4rem auto;
            padding: 2rem;
            background: var(--bg-card);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--primary);
            border-radius: 24px;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .back-link {
            color: var(--primary-light);
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="admin-container">
            <div class="admin-header">
                <h2 class="section-title">Admin Dashboard</h2>
                <a href="index.html" class="back-link">← Back to Shop</a>
            </div>

            <div class="admin-controls-grid">
                <div class="admin-card">
                    <h3>Wallet Control</h3>
                    <div class="admin-form-group">
                        <label>Current Token Balance</label>
                        <input type="number" id="admin-set-balance" value="500">
                        <button onclick="adminSetBalance()">Update Balance</button>
                    </div>
                </div>
                <div class="admin-card">
                    <h3>Add New Item</h3>
                    <div class="admin-form-group">
                        <input type="text" id="new-item-name" placeholder="Item Name">
                        <input type="text" id="new-item-desc" placeholder="Description">
                        <input type="number" id="new-item-price" placeholder="Price">
                        <input type="text" id="new-item-image" placeholder="Image URL (e.g. assets/...)">
                        <button onclick="adminAddItem()">Create Item</button>
                    </div>
                </div>
                <div class="admin-card" style="grid-column: 1 / -1;">
                    <h3>Manage Shop Items</h3>
                    <div id="admin-item-list" class="admin-item-list">
                        <!-- Items will be injected here -->
                    </div>
                </div>
                <div class="admin-card" style="grid-column: 1 / -1;">
                    <h3>Reset Shop</h3>
                    <button onclick="adminResetAll()" style="background: #ff4d4d; width: 100%;">Reset All Data (Clear
                        Inventory &
                        Custom Items)</button>
                </div>
            </div>
        </div>
    </div>

    <div id="notification">Action completed successfully!</div>

    <!-- Custom Confirm Prompt -->
    <div id="simple-confirm-prompt"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; align-items: center; justify-content: center;">
        <div
            style="background: #1a1a2e; padding: 2rem; border-radius: 8px; border: 1px solid #ff4d4d; text-align: center; color: white; font-family: 'Inter', sans-serif;">
            <h3 style="margin-top: 0; margin-bottom: 2rem; color: #ff4d4d;">Are you sure you want to delete this item?
            </h3>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button id="simple-confirm-submit"
                    style="background: #ff4d4d; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; font-weight: bold; flex: 1;">Delete</button>
                <button id="simple-confirm-cancel"
                    style="background: rgba(255,255,255,0.2); color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; flex: 1;">Cancel</button>
            </div>
        </div>
    </div>

    <script src="admin.js?v=2"></script>
</body>


</html>

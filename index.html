<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula Tokens - Premium Item Shop</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <div class="logo">NEBULA SHOP</div>
            <div class="header-right">
                <div class="admin-login">
                    <input type="password" id="admin-pass" placeholder="Admin Key...">
                    <button id="admin-login-btn">Login</button>
                    <a href="admin.html" id="admin-link"
                        style="display: none; color: var(--primary-light); text-decoration: none; font-weight: 600;">Go
                        to Admin Portal</a>
                </div>
                <div class="wallet">
                    <span class="token-icon">✦</span>
                    <span id="balance-display" class="token-balance">500</span>
                    <span style="font-size: 0.8rem; opacity: 0.7;">TOKENS</span>
                </div>
            </div>
        </header>


        <main>
            <section class="shop-section">
                <h2 class="section-title">Available Tech</h2>
                <div id="shop-grid" class="shop-grid">
                    <!-- Items will be injected by script.js -->
                </div>
            </section>

            <section class="inventory-section">
                <h2 class="section-title">Your Inventory</h2>
                <div id="inventory-grid" class="shop-grid">
                    <!-- Purchased items will be injected by script.js -->
                    <div class="empty-inventory">No items acquired yet.</div>
                </div>
            </section>
        </main>
    </div>

    <div id="notification">Item purchased successfully!</div>

    <div id="simple-name-prompt"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; align-items: center; justify-content: center;">
        <div
            style="background: #1a1a2e; padding: 2rem; border-radius: 8px; border: 1px solid #9d4edd; text-align: center; color: white; font-family: 'Inter', sans-serif;">
            <h3 style="margin-top: 0; margin-bottom: 1rem;">What is your name?</h3>
            <input type="text" id="simple-name-input"
                style="padding: 0.5rem; width: 80%; margin-bottom: 1rem; background: rgba(0,0,0,0.5); border: 1px solid #9d4edd; color: white; border-radius: 4px;"
                autofocus>
            <div>
                <button id="simple-name-submit"
                    style="background: #9d4edd; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; margin-right: 0.5rem; font-weight: bold;">Confirm</button>
                <button id="simple-name-cancel"
                    style="background: rgba(255,255,255,0.2); color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer;">Cancel</button>
            </div>
        </div>
    </div>

    <script src="script.js?v=3"></script>
</body>

</html>
